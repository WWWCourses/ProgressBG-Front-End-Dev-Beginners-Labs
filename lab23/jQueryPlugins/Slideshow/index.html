<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>SlideShow</title>
	<!-- <script src="https://code.jquery.com/jquery-3.7.1.slim.min.js" integrity="sha256-kmHvs0B+OpCW5GVHUNjv9rOmY0IvSIRcf7zGUDTDQM8=" crossorigin="anonymous"></script> -->
	<script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
	<script src="./fade-slide-flip/dist/jquery.slideshowad.js"></script>

	<style>
		.mySlideshow {
			display:none;
			max-width: 600px;
		}
		img{
			width: 100%;
		}
	</style>
</head>
<body>
	<div class="mySlideshow">
		<a href="#"><img src="../../../images/small/netherlands-5039354_1920.jpg"></a>
		<a href="#"><img src="../../../images/small/sunset-5560658_1920.jpg"></a>
		<a href="#"><img src="../../../images/small/netherlands-5039354_1920.jpg"></a>
		<a href="#"><img src="../../../images/big/netherlands-5039354_1920.jpg"></a>
		<a href="#"><img src="../../../images/checkmate-1511866_640.jpg"></a>
	</div>
	<script>
		console.log($.fn.jquery)
		$('.mySlideshow').slideShowAd({
			slideShowType: 'slideLeft',
			duration: 3000,
			interval: 3000,
			// width:'300px',
			// height:'80vh'
		});

	</script>
</body>
</html>
