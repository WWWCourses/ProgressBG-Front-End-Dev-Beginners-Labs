<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>cssFonts </title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;500;600;700&family=Comforter+Brush&family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&family=Rubik+Microbe&display=swap" rel="stylesheet">
	<style>
		@font-face {
			/* задаваме име на шрифта":*/
			font-family: Iva;

			/* указваме пътя до файловете със шрифта */
			src: url("fonts/Chasing Embers Demo Version.otf"),
				url("fonts/Chasing Embers Demo Version.ttf");
		}
		h1{
			font-family: 'Rubik Microbe';
		}
		p{
			font-family: "Iva", cursive;
			font-size: 5em;
			font-weight: normal;
		}

	</style>
</head>
<body>
	<h1>Това е моят сайт!</h1>
	<p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Voluptatem soluta corporis cupiditate error nisi ab possimus quo modi consectetur recusandae ullam harum, suscipit dignissimos iusto tempora exercitationem repellendus in odit!</p>
</body>
</html>
