<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>tmp </title>
	<style>
		/* .flag{
			display: inline-block;
			line-height: 2em;
			width: 20em;
			border: .2em solid #333;
		} */

		.flag>span{
			display: block;
		}

		.bg>span:nth-child(1){
			background: white;
			color: #CCC;
		}

		.bg>span:nth-child(2){
			background: green;
			color: #CCC;
		}
		.bg>span:nth-child(3){
			background: red;
		}
	</style>
</head>
<body>
	<div class="flag bg">
		<span>Бяло</span><span>Зелено</span><span>Червено</span>
	</div>
</body>
</html>
