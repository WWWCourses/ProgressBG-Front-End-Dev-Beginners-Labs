<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>transEffect </title>
	<style>
		.box{
			width: 200px;
			height: 200px;
			background-color: #F00;
			transition-duration: 2s;
		}
		.box:hover{
			margin-top: -200px;
		}
	</style>
</head>
<body>
	<div class="box"></div>
</body>
</html>
