<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>shadows </title>
	<style>
		.text-shadow{
			font-size: 10em;
			text-shadow:
				2px 2px 2px red,
				10px 10px 2px green,
				20px 20px 2px blue;

			color: #000;
		}
		.box-shadow{
			width: 200px;
			height: 200px;
			margin: 1em;
			border: 5px solid #000;
			/* box-shadow: [inset] h-shadow v-shadow blur-radius spread-radius color; */
			box-shadow:
				0px 0px 20px 20px red,
				0px 0px 20px 70px blue;
		}
	</style>
</head>
<body>
	<div class="text-shadow">A</div>
	<div class="box-shadow"></div>

</body>
</html>
