<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>alignMenu </title>
	<style>
		header{
			height: 10em;
			background-color:#666;
			border-bottom: 5px solid #000;
		}

		nav>ul, nav>li{
			margin:0;
			padding: 0;
			list-style-type: none;

		}
		nav ul{
			display: flex;
		}
		nav li{
			height: 30px;
			position: relative;
			/* border:5px solid red; */
		}

		nav li::after{
			position: absolute;
			left:0; right:0;
			bottom:8.5em;
			content:"";
			display: block;
			border-bottom:5px solid green;
		}
		nav li:hover::after{
			bottom:-8.5em;
		}


	</style>
</head>
<body>
	<header>
		<nav>
			<ul>
				<li>Item 1</li>
				<li>Item 2</li>
				<li>Item 3</li>
			</ul>
		</nav>
	</header>
</body>
</html>
