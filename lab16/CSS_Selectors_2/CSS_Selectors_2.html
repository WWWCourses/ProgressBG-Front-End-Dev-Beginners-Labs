<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>CSS_Selectors_2 </title>
	<style>
		.parent{
			width: 300px;
			height: 300px;
			background-color: #F99;
		}
		.child{
			width: 50%;
			height: 50%;
			background-color: #99F;
		}
	</style>
</head>
<body>
	<div class="parent">
		<div class="child"></div>
	</div>
</body>
</html>
