<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>CSS_Selectors_2 </title>
	<style>
		.red{
			width: 300px;
			height: 300px;
			background-color: #F99;
		}
		.blue{
			width: 300px;
			height: 300px;
			background-color: #99F;
		}
		/* when the .red is hovered => change blue
		 */
		.red:hover+.blue{
			background-color: orange;
		}
	</style>
</head>
<body>
	<div class="red"></div>
	<div class="blue"></div>
</body>
</html>
