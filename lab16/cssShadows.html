<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>cssShadows </title>
	<style>
		.logo{
			font-size: 4em;
			width: 5em;
			border:5px solid #333;
			border-radius: 100%;
			text-align: center;
			padding: 0.5em;
			margin: 2em;
		}
		.text-shadow{
			text-shadow:
				-2px 2px 0px hsl(0, 10%, 30%),
				-4px 4px 0px hsl(0, 10%, 50%),
				-6px 6px 0px hsl(0, 10%, 60%),
				-8px 8px 0px hsl(0, 10%, 80%);
		}
		.box-shadow{
			box-shadow:
				0px 0px 20px 0px red;
		}
	</style>
</head>
<body>
	<div class="logo text-shadow box-shadow">Logo</div>
</body>
</html>
