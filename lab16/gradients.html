<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>gradients </title>
	<style>
		.box{
			width: 12em;
			height: 6em;
			margin: 3em;
			background-color: #FFF;
			border:2px solid #000;
		}
		.gradient{
			background-image: linear-gradient(
				45deg,
				#F00 50%,
				#0F0
			);
		}
	</style>
</head>
<body>
	<div class="box gradient"></div>
</body>
</html>
