<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>envelopEffect </title>
	<style>

		.box{
			position: relative;
			width: 12em;
			height: 6em;
			margin: 3em;
			background-color: #FFF;
			border:2px solid #000;
		}

		.box::after{
			content:"";
			display: block;
			position: absolute;
			bottom: 8px; left:-5px;
			transform: rotate(-5deg);
			width: 6em;
			height: 0em;
			box-shadow: 10px 10px 5px 5px #777;
			z-index: -1;
		}



	</style>
</head>
<body>
	<div class="box">

	</div>
</body>
</html>
