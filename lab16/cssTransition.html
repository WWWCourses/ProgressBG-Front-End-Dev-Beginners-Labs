<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>cssTransition </title>
	<style>
		.move-wrapper{
			position: relative;
			height: 200px;
			background-color:#ccc;
		}
		/* State A */
		.box{
			position: absolute;
			left:0;top:0;
			width: 200px;
			height: 200px;
			background-color: #F00;
			transition-duration: 2s;
			/* transition-delay: 1s; */
			/* transition-property:width,height; */
			transition-timing-function:linear;

		}
		/* State B */
		.move-wrapper:hover>.box{
			left:calc(100% - 200px);
			width: 200px;
			height: 200px;
			background-color: #0F0;

		}
	</style>
</head>
<body>
	<div class="move-wrapper">
		<div class="box"></div>
	</div>

</body>
</html>
