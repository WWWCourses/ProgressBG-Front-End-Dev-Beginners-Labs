<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tables</title>
</head>
<body>
    <h1>Tables</h1>
    <table border="1">
        <caption>Table 1</caption>
        <colgroup>
            <col style="background-color:red">
        </colgroup>
        <thead>
            <tr>
                <th>Name</th>
                <th>Score</th>
                <th>Course</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Ivan</td>
                <td>5</td>
                <td>Math</td>
            </tr>
            <tr>
                <td>Pesho</td>
                <td>3</td>
                <td>Physics</td>
            </tr>
        </tbody>
    </table>
</body>
</html>
