<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>transitionIntro </title>
	<style>
		/* състояние А: 0s */
		.test{
			width: 300px;
			height: 300px;
			background-color: red;
			/* transition-property: width,background-color;
			transition-duration: 1000ms;
			transition-delay: 0.5s; */

			/* transition: property duration timing-function delay|initial|inherit; */
			transition: width 1000ms linear 0s,
						background-color 300ms cubic-bezier(0.075, 0.82, 0.165, 1) 0ms;

			/* transition: 500ms; */
		}

		/* 0000ms=> width:300px
		0010ms=> width:303px
		0020ms=> width:303px
		...
		1000ms => width:500px */


		/* състояние Б  1s*/
		.test:hover{
			width: 500px;
			background-color:blue;
		}

		/* състояние В:
		.test:active{
			width: 1000px;
			background-color: green;
		} */
	</style>
</head>
<body>
	<div class="test">A</div>
</body>
</html>
