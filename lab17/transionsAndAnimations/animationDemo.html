<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>animationDemo </title>
	<style>
		.test{
			opacity: 1;
			width: 200px;
			height: 200px;
			background-color:red;
			animation: squareMove 3s linear infinite;

			/* transform: rotate(45deg); */
		}

		@keyframes squareMove {
			0%,100%{
				margin-left: 0px;
			}

			50%{
				margin-left: calc(100vw - 16px - 200px);
			}
		}
	</style>
</head>
<body>
	<div class="test"></div>
</body>
</html>
