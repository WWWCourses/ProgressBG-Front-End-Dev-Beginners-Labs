<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>box_shadow </title>
	<style>
		/* box-shadow: [inset] h-shadow v-shadow blur-radius spread-radius color; */
		.box{
			width: 10em;
			height: 8em;
			margin: 3em;
			border:5px solid #000;
			box-shadow:
				0px 0px 0px 20px #F00,
				0px 0px 0px 40px #0F0;
			border-radius: 100%;
		}
	</style>
</head>
<body>
	<div class="box"></div>
</body>
</html>
