<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>eventsIntro </title>
	<style>
		.test{
			width: 10em;
			height: 10em;
			background-color: red;
		}
	</style>
</head>
<body>
	<div class="test" ondblclick="setRContent()"></div>


	<script>
		function setLContent() {
			div.innerHTML="<i>Left</i>"
		}
		function setRContent() {
			div.innerHTML="<i>Right</i>"
		}


		let div = document.querySelector('.test');
		div.addEventListener('click', setLContent)
	</script>
</body>
</html>
