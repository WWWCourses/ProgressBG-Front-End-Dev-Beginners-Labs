<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>CSS_Length_Units </title>
	<style>
		html{
			font-size: 9px;
		}
		body{
			font-size: initial;
		}
		header{
			/* font-size: 100px; */
		}

		.red{
			font-size: 10px;
			padding-top: 200px;
			width: 400px;
			height: 400px;
			background-color: red;
		}
		.blue{
			font-size: 2em;
			font-size: 200%;

			/* 200px | 50px */
			padding-top: 50%;
			width: 100px;
			height: 100%;
			background-color: blue;
		}

		.logo{
			font-size: 80px;
			width: 20em;
			height: 15em;
			border: .3em dotted red;
			text-align: center;
			line-height: 15rem;
			border-radius: 100%;
		}

	</style>
</head>
<body>
	<div class="box red"></div>
	<!-- <div class="box blue">font</div> -->
	<hr>
	<header>
		<div class="logo">Logo</div>
		<p>Lorem ipsum dolor sit, amet consectetur adipisicing elit. Aperiam deleniti tenetur mollitia assumenda sed. Commodi sint consequuntur quis amet voluptatibus vero maxime, perspiciatis rerum, reiciendis deserunt cumque unde, eum quia?</p>
	</header>
	<hr>
	<div class="red">
		<div class="blue"></div>
	</div>

</body>
</html>
