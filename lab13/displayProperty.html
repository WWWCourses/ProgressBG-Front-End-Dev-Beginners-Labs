<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>displayProperty </title>
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/meyer-reset/2.0/reset.min.css">
	<style>
		.box{
			display: inline-block;
			width: 10em;
			height: 10em;
		}
		.inline{
			display: block;
			width: 10em;
			height: 10em;
		}
		.red{
			/* background-color: #F99; */
			border:1em solid #F99;
		}
		.blue{
			/* background-color: #99F; */
			border:1em solid #99F;
		}
		.test{
			/* display: none; */
			/* opacity: 0; */
			/* visibility: hidden; */
		}
	</style>
</head>
<body>
	<div class="box red">Block Red</div>
	<div class="box blue test">Block Blue</div>
	<hr>
	<span class="inline red">Inline Red</span>
	<span class="inline blue">Inline Blue</span>
</body>
</html>
