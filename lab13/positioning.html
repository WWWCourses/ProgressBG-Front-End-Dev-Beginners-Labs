<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Document</title>
	<style>
		.box{
			/* width: 10em;
			height: 10em; */
			box-sizing: border-box;
		}
		.red{
			position: relative;
			height: 10em;
			background-color: red;
			border: 5px solid red;
		}
		.blue{
			position: fixed;
			bottom: 0;
			right: 0;
			width: 5em;
			height: 5em;
			background-color: blue;
		}
	</style>
</head>
<body>
	<div class="box red">
		<div class="box blue"></div>
	</div>

</body>
</html>
