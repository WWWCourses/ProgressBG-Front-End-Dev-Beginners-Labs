<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>positioningDemo </title>
	<style>
		.box{
			width: 10em;
			height: 10em;
		}
		.red{
			/* position: relative; */
			position: fixed;
			bottom:0px;
			right: 0px;

			background-color: red;
			/* opacity: .5; */
		}
		.blue{
			background-color: blue;
		}
	</style>
</head>
<body>
	<div class="box red">red</div>
	<div class="box blue">blue</div>
</body>
</html>
