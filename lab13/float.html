<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>float </title>
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/meyer-reset/2.0/reset.min.css">
	<style>
		.wrapper{
			width: 80%;
			margin: 0 auto;
			border: 5px solid #999;
		}
		.wrapper img{
			float: left;
			margin-top: 2em;
			display: block;
			width: 10em;
			opacity: .8;
			/* height: 5em; */
		}
		p{
			border:10px solid #F99;
			/* text-align: right; */
		}
	</style>
</head>
<body>
	<h1>Float</h1>
	<div class="wrapper">
		<img src="../images/checkmate-1511866_640.jpg" alt="checkmate">
		<img src="../images/checkmate-1511866_640.jpg" alt="checkmate">
		<p>Line1</p>
		<p>Line2</p>
	</div>
</body>
</html>
