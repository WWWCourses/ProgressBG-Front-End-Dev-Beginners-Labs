<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>nth_child_and_of_type </title>
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/meyer-reset/2.0/reset.min.css">
	<style>
		.wrapper div{
			border:2px solid #f99;
		}
		.wrapper div:nth-last-child(1){
			background-color:#9f9;
		}



	</style>
</head>
<body>
	<div class="wrapper">
		<div>Item 1</div>
		<div>Item 2</div>
		<div>Item 3</div>
		<div>Item 4</div>
		<div>Item 5</div>
	</div>
</body>
</html>
