<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>clearFloatEffect </title>
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/meyer-reset/2.0/reset.min.css">
	<style>
		*{
			box-sizing: border-box;
		}
		.wrapper{
			border: 10px solid red;
		}
		.box{
			float: left;
			margin: 1em;
			width: 5em;
			height: 7em;
			border: 10px solid blue;
		}
		.clear{
			clear:both;
			border:5px solid orange;
		}
	</style>
</head>
<body>
	<div class="wrapper">
		<div class="box"></div>
		<div class="box"></div>
		<div class="box"></div>
		<div class="box"></div>
		<div class="box"></div>
		<div class="box"></div>
		<div class="box"></div>
		<div class="box"></div>
		<div class="clear"></div>
	</div>
	<p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Iste neque eos deserunt dolore! Animi expedita possimus tempora, molestiae minima harum repudiandae corporis explicabo, distinctio, eum quod est fugit fugiat sequi?</p>
</body>
</html>
