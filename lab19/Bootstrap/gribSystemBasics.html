<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>gribSystemBasics </title>

	<!-- Bootstrap CSS -->
	<link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/css/bootstrap.min.css" integrity="sha384-Vkoo8x4CGsO3+Hhxv8T/Q5PaXtkKtu6ug5TOeNV6gBiFeWPGFN9MuhOf23Q9Ifjh" crossorigin="anonymous">

	<style>
		.row > div {
			line-height: 4em;
			text-align: center;
			border: 1px solid #333;
			color: #fff;
		}
		.row:nth-child(1) > div:nth-child(1) {background: #300;}
		.row:nth-child(1) > div:nth-child(2) {background: #400;}
		.row:nth-child(1) > div:nth-child(3) {background: #500;}
		.row:nth-child(1) > div:nth-child(4) {background: #600;}
		.row:nth-child(1) > div:nth-child(5) {background: #700;}
		.row:nth-child(1) > div:nth-child(6) {background: #800;}
		.row:nth-child(1) > div:nth-child(7) {background: #900;}
		.row:nth-child(1) > div:nth-child(8) {background: #a00;}
		.row:nth-child(1) > div:nth-child(9) {background: #b00;}
		.row:nth-child(1) > div:nth-child(10) {background: #c00;}
		.row:nth-child(1) > div:nth-child(11) {background: #d00;}
		.row:nth-child(1) > div:nth-child(12) {background: #e00;}

		.row:nth-child(2) > div:nth-child(1) {background: #030;}
		.row:nth-child(2) > div:nth-child(2) {background: #050;}
		.row:nth-child(2) > div:nth-child(3) {background: #070;}
		.row:nth-child(2) > div:nth-child(4) {background: #090;}
		.row:nth-child(2) > div:nth-child(5) {background: #0b0;}
		.row:nth-child(2) > div:nth-child(6) {background: #0d0;}

		.row:nth-child(3) > div:nth-child(1) {background: #006;}
		.row:nth-child(3) > div:nth-child(2) {background: #008;}
		.row:nth-child(3) > div:nth-child(3) {background: #00a;}
		.row:nth-child(3) > div:nth-child(4) {background: #00c;}

		.row:nth-child(4) > div:nth-child(1) {background: #800;}
		.row:nth-child(4) > div:nth-child(2) {background: #a00;}
		.row:nth-child(4) > div:nth-child(3) {background: #c00;}

		.row:nth-child(5) > div:nth-child(1) {background: #070;}
		.row:nth-child(5) > div:nth-child(2) {background: #080;}

		.row:nth-child(6) > div:nth-child(1) {background: #00c;}

	</style>
</head>
<body>
	<div class="container">
	<div class="row">
		<div class="col-xl">col-xl 1</div>
		<div class="col-xl">col-xl 2</div>
		<div class="col-xl">col-xl 3</div>
		<div class="col-xl">col-xl 4</div>
		<div class="col-xl">col-xl 5</div>
		<div class="col-xl">col-xl 6</div>
		<div class="col-xl">col-xl 7</div>
		<div class="col-xl">col-xl 8</div>
		<div class="col-xl">col-xl 9</div>
		<div class="col-xl">col-xl 10</div>
		<div class="col-xl">col-xl 11</div>
		<div class="col-xl">col-xl 12</div>
	</div>
	<div class="row">
		<div class="col-lg">col-lg 1</div>
		<div class="col-lg">col-lg 2</div>
		<div class="col-lg">col-lg 3</div>
		<div class="col-lg">col-lg 4</div>
		<div class="col-lg">col-lg 5</div>
		<div class="col-lg">col-lg 6</div>
	</div>
	<div class="row">
		<div class="col-md">col-md 1</div>
		<div class="col-md">col-md 2</div>
		<div class="col-md">col-md 3</div>
		<div class="col-md">col-md 4</div>
	</div>
	<div class="row">
		<div class="col-sm">col-sm 1</div>
		<div class="col-sm">col-sm 2</div>
		<div class="col-sm">col-sm 3</div>
	</div>
	<div class="row">
		<div class="col">col 1</div>
		<div class="col">col 2</div>
	</div>
	<div class="row">
		<div class="col-sm">
			col-sm 1
		</div>
	</div>
</body>
</html>
