<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>marginCollapse </title>
	<style>
		body{
			border: 5px solid green;
		}

		div{
			display: inline-block;
		}
		#d1{
			border: 5px solid red;
			margin: 50px;
		}
		#d2{
			border: 5px solid red;
			margin-top: 100px;
			margin-left: 50px;

		}

	</style>
</head>
<body>
	<div id="d1">Div1</div><div id="d2">Div2</div>
</body>
</html>
