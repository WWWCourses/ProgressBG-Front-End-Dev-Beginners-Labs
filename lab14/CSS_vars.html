<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>CSS_vars </title>
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/meyer-reset/2.0/reset.min.css">
	<style>
		:root{
			--red:#9F3121
		}
		.red{
			color: var(--red);
		}
	</style>

</head>
<body>
	<h1 class="red">Red</h1>
	<div>
		<div class="red">Red</div>
	</div>
</body>
</html>
