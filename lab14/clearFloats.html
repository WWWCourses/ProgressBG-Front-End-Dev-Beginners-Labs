<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>clearFloats </title>
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/meyer-reset/2.0/reset.min.css">
	<style>
		.products-container{
			width: 90%;
			margin: 0 auto;
			border:5px solid red;
		}
		.product{
			float: left;
			margin: .5em;
			width: 30%;
			height: 300px;
			border:5px solid blue;
		}
		.clear{
			background-color:orange;
			clear:both;
		}
	</style>
</head>
<body>
	<div class="products-container">
		<div class="product">prod1</div>
		<div class="product">prod2</div>
		<div class="product">prod3</div>
		<div class="product">prod4</div>
		<div class="product">prod5</div>
		<div class="product">prod6</div>
		<div class="clear"></div>
	</div>
	<main>
		<p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Perferendis labore, sapiente facere officia ad nihil voluptatum libero error, quaerat delectus repudiandae consequatur quam cumque quia velit possimus tenetur nesciunt quasi.</p>
	</main>
</body>
</html>
