<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>taskNavMenu </title>
	<style>
		.menu{
			font-size: 1em;
			list-style-type: none;
		}
		.menu>li{
			display: inline-block;
			margin-left: -0.4em;
			vertical-align: top;

			width: 8em;
			height: 5em;

			/* line-height: 5em; */
			text-align: center;
			border: 5px solid #999;
			background-color: #900;
			box-sizing: border-box;

		}
		.menu>li>a{
			display: inline-block;
			width: 100%;
			height: 100%;
			border: 1px solid yellow;
			text-decoration: none;
			color: #FFF;
		}
		#about{
			font-size: 4em;
		}
	</style>
</head>
<body>
	<nav>
		<ul class="menu">
		  	<li><a href="#">Products</a></li>
			<li><a href="#" id="about">About</a></li>
		  	<li><a href="#">Contacts</a></li>
		</ul>
	</nav>

	<ul>
		<li>Todo1</li>
		<li>Todo2</li>
	</ul>
</body>
</html>
