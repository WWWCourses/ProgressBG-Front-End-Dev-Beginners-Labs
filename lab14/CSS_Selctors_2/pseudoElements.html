<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>pseudoElements </title>
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/meyer-reset/2.0/reset.min.css">
	<style>
		p::selection{
			background-color: #F99;
		}
		p::first-line{
			text-decoration: underline;
		}
		p::first-letter{
			font-size: 2em;
		}
	</style>
</head>
<body>
	<p>Lorem ipsum dolor, sit amet consectetur adipisicing elit. Fuga neque porro voluptates atque adipisci dolores minus rem distinctio explicabo quibusdam odio blanditiis, amet consectetur saepe ad praesentium ex a magnam.</p>
</body>
</html>
