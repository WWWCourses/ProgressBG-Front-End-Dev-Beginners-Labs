<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>iconInInput </title>
	<style>
		label{
			position: relative;
			display: block;
			width: 10em;
			height: 2em;
			line-height: 5em;
			padding: 0.5em;
			border: 1px solid green;
		}
		input{
			/* border:none; */
			height: 100%;
		}
		.icon{
			display: inline-block;

			position: absolute;
			/* top: 0.5em; bottom:0.5em;  */
			bottom:0.5em;
			right: 2px;

			/* TODO: fix red to be aligned to the label */
			/* line-height: 5em; */
			vertical-align: middle;

			width: 1.5em;
			height: 1.5em;

			background-color:red;
			border-radius: 50%;

		}
	</style>
</head>
<body>
	<label for="">
		<input type="text" placeholder="enter your name">
		<div class="icon"></div>
	</label>
</body>
</html>
