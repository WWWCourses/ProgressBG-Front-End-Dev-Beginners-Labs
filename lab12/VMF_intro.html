<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>VMF_intro </title>
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/meyer-reset/2.0/reset.min.css">
	<style>
		*{
			box-sizing: border-box;
		}
		main{
			border:10px solid #9F9;
		}
		.left, .right{
			display: inline-block;
			vertical-align: top;
			min-height: 20vh;
		}
		.left{
			width: 200px;
			background-color: #F99;
		}
		.right{
			font-size:20px;
			width:calc(100% - 200px);
			margin-left: -8px;
			background-color: #99F;
		}
		nav{
			margin-top: 1em;
		}
		nav li{
			display: inline-block;
			vertical-align:top;
			text-align: center;
			height: 3em;
			width: 10em;
			margin-left: -8px;
			border: 2px solid #000;
		}
		nav a{
			display: inline-block;
			width: 100%;
			height: 100%;
			background-color:#AAA;
		}
		#a2{
			font-size: 1.5em;
		}
	</style>
</head>
<body>
	<nav>
		<ul>
			<li><a href="">Home</a></li>
			<li><a id="a2" href="">Products</a></li>
			<li><a href="">About</a></li>
		</ul>
	</nav>
	<hr>
	<main>
		<div class="left"></div>
		<div class="right">
			<p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Quod cumque quisquam provident ea tempore quibusdam inventore, odit corrupti culpa sequi quas adipisci dolorem esse itaque reiciendis aliquam accusantium et nesciunt!</p>
		</div>
	</main>
</body>
</html>
