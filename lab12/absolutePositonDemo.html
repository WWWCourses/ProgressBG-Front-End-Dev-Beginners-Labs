<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>absolutePositonDemo </title>
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/meyer-reset/2.0/reset.min.css">
	<style>
		*{
			box-sizing: border-box;
		}
		.product{
			position: relative;
			display: inline-block;
			width: 10em;
			height: 15em;
			border: 5px solid #F99;
		}
		.price{
			position: absolute;
			bottom: 0;
			left: 0;
			right: 0;

			background-color: #9F9;
		}
	</style>
</head>
<body>
	<div class="product">
		<div class="title">Product1</div>
		<div class="price">20lv</div>
	</div>
