<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>VFM_INtro </title>
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/meyer-reset/2.0/reset.min.css">
	<style>
		a{
			display: inline-block;
			width: 200px;
			height: auto;
			padding: 1em;
			border: 10px solid red;
			background-color: #F99;
		}
		p{
			display: inline-block;
			width: 200px;
			height: auto;
			padding: 1em;
			border: 10px solid red;
			background-color: #F99;
		}
		.invisible{
			visibility: hidden;
		}
	</style>
</head>
<body>
	<hr>
	<h2 class="invisible">Inline Elements</h2>
	<hr>
	<a href="#">Link1</a>
	<a href="#">Link2</a>
	<a href="#">Link2</a>
	<a href="#">Link2</a>
	<h2>Block Elements</h2>
	<p>Paragraph1</p>
	<p>Paragraph2</p>
</body>
</html>
