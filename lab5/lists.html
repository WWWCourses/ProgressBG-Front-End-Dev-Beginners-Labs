<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Lists</title>
</head>
<body>
	<h1>Lists</h1>

	<h2>Shoping List:</h2>
	<ul>
		<li>Item1
			<ul>
				<li>Sub Item 1</li>
				<li>Sub Item 2</li>
			</ul>
		</li>
		<li>Item2</li>
		<li>Item3</li>
		<li>Item3</li>
	</ul>

	<h2>Ordered list</h2>
	<!-- TASK:
	z. Item 1
	y. Item 2
	x. Item 3 -->

	<ol start="26" reversed type="a">
		<li>Item 1</li>
		<li>Item 2</li>
		<li>Item 3</li>
		<li value="1">Item New</li>
	</ol>


</body>
</html>
