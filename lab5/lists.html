<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>lists</title>
</head>
<body>
	<h1>HTML lists</h1>
	<ul>
		<li>Item 1</li>
		<li>Item 2</li>
		<li>Item 3</li>
	</ul>
	<hr>
	<ol type="A" reversed>
		<li>Item1</li>
		<li>Item2</li>
		<li>CTRL+SHIFT+D</li>
		<li>CTRL+SHIFT+D</li>
	</ol>
	<hr>
	<h2>Nested Lists</h2>
	<ul>
		<li>
			<b>Auhtor1</b>
			<ol>
				<li>Item 1</li>
				<li>Item 1</li>
				<li>Item 1</li>
			</ol>
		</li>
		<li><b>Auhtor 2</b>
			<ol>
				<li>Book 1</li>
				<li>Book 2</li>
			</ol>
		</li>
	</ul>



</body>

</html>
