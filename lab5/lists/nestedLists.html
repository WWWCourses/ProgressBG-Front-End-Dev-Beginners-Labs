<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>nestedLists </title>
</head>
<body>
	<h1>Nested lists</h1>

	<h2>Favorite authors and books</h2>
	<ol>
		<li>Author 1
			<ul>
				<li>Book 1</li>
				<li>Book 2</li>
			</ul>
		</li>

		<li>Author 2</li>
		<li>Author 3</li>
	</ol>
</body>
</html>
