<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Tables</title>
</head>
<body>
	<table border="1">
		<colgroup>
			<col style="background-color: gray;">
			<col span="2" style="background-color: lightblue;">
		</colgroup>
		<tr>
			<th>No.</th>
			<th>First Name</th>
			<th>Last Name</th>
		</tr>
		<tr>
			<td>1.</td>
			<td>Ivan</td>
			<td>Ivanov</td>
		</tr>
		<tr>
			<td>2.</td>
			<td>Asenov</td>
			<td>Asenovov</td>
		</tr>
		<caption>Students</caption>
	</table>

<!--
	1. 	Ivan 	Ivanov
	2. 	Asenov 	Asenovov -->
</body>
</html>
