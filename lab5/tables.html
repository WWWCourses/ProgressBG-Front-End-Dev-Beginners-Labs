<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Tables</title>
</head>
<body>
	<h1>Tables</h1>
	<table border="1">
		<caption>User ages</caption>
		<colgroup>
			<col span="2" style="background-color: #CCC;">
			<col style="background-color: #CFC;">
		</colgroup>

		<thead>
			<tr>
				<th>Name</th>
				<th>Age</th>
				<th>Color</th>
			</tr>
		</thead>
		<tbody>
			<tr>
				<td class="red">Ivan</td>
				<td class="red">23</td>
				<td class="red">Red</td>
			</tr>
			<tr>
				<td>Pesho</td>
				<td>34</td>
				<td>Blue</td>
			</tr>
			<tr>
				<td>Gosho</td>
				<td>24</td>
				<td>Green</td>
			</tr>
		</tbody>
	</table>
	<hr>
	<table border="1">
		<tr>
			<td colspan="2">12</td>
			<td rowspan="2">36</td>
		</tr>
		<tr>
			<td rowspan="2">47</td>
			<td>5</td>
		</tr>
		<tr>
			<td colspan="3">89</td>
		</tr>
	</table>

</body>
</html>
