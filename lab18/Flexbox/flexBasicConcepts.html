<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>flexBasicConcepts </title>

	<style>
		/* FLEX CONTAINER PROPERTIES */
		.box-containter{
			border:5px solid #000;
			width: 700px;
			height: 700px;
			display: flex;

			/* change Main Axis direction */
			/* flex-direction: column; */

			/* how to wrap flex items*/
			flex-wrap: wrap;

			/* distribution of space between and around content items on the  Main Axis */
			justify-content: flex-end;

			/* distribution of space between and around content items on the  Cross Axis */
			/* align-content: space-around; */

			/* alignment of items on the Cross Axis, can be overriden by each flex item with alignb-self prop */
			/* align-items: flex-end; */
		}

		/* flex items */
		.box{
			/* width: 200px; */
			height: 50px;
		}
		.box:nth-child(1){
			background-color: #9400D3;
			color: #FFF;
			/* align-self:flex-start; */
		}
		.box:nth-child(2){
			background-color: #4B0082;
			color: #FFF;
			/* order: 6; */
			/* align-self: center; */
		}
		.box:nth-child(3){
			background-color: #0000FF;
			color: #FFF;
		}
		.box:nth-child(4){ background-color: #00FF00; }
		.box:nth-child(5){ background-color: #FFFF00; }
		.box:nth-child(6){ background-color: #FF7F00; }
		.box:nth-child(7){ background-color: #FF0000; }
	</style>
</head>
<body>
	<section class="box-containter">
		<div class="box">box1</div>
		<div class="box">box2</div>
		<div class="box">box3</div>
		<div class="box">box4</div>
		<div class="box">box5</div>
		<div class="box">box6</div>
		<div class="box">box7</div>
	</section>
</body>
</html>
