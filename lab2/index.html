<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>index </title>
</head>
<body>
	<script>
		let x = 5;

		console.log("x = " + x);
		console.log(`x = ${x}`);

		let arr1 = [1,2,3];
		// let arr2 = arr1.push(4,5);
		let arr2 = [...arr1,4,5];

		console.log( arr1 ); // [1,2,3]
		console.log( arr2 ); // [1,2,3,4,5]
	</script>
</body>
</html>
