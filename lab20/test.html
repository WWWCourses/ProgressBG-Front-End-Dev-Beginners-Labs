<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Document</title>
</head>
<body>
	<label>Price without VAT: <input type="number"></label>
	<button>Show price with VAT</button>

	<script>
		let priceWithoutVATInput = document.querySelector('[type="number"]');

		let btn = document.querySelector('button');


		btn.addEventListener("click", function () {
			let priceWithoutVAT = priceWithoutVATInput.value;
			console.log(priceWithoutVAT + 100); // 180
		})
	</script>
</body>
</html>
