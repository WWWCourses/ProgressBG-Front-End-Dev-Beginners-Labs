<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>fontStyling </title>
	<style>
		p{
			/* font-family: "Courier New", Courier, monospace;
			font-size: 20px;
			font-style: italic;
			font-variant: small-caps; */

			/* font: font-style font-variant font-weight font-size/line-height font-family */
			font: italic small-caps 30px/5 monospace;
		}
	</style>
</head>
<body>
	<p>Текст на кирилица</p>
	<p>Text in latin</p>
	<div style="font-weight: 100;">test text</div>
	<div style="font-weight: 200;">test text</div>
	<div style="font-weight: 400;">test text</div>
	<div style="font-weight: 800;">test text</div>
	<p>Lorem, ipsum dolor sit amet consectetur adipisicing elit. Fugit sint placeat accusamus! Atque labore dolores voluptatibus qui, eum aperiam, omnis laudantium saepe tempora rerum numquam cumque non fugiat ipsam quia.</p>
</body>
</html>
