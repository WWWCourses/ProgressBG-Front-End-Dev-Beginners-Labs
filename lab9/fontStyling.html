<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>fontStyling </title>
	<style>
		/* Асоциираме име на шрифт с конкретен файл */
		@font-face {
                /* задаваме име на шрифта":*/
                font-family: ChasingEmbers;

                /* указваме пътя до файловете със шрифта */
                src: url("fonts/Chasing Embers Demo Version.otf"),
                     url("fonts/Chasing Embers Demo Version.ttf");
            }

		/* За всички параграфи */
		p{
			font-size: 50px;
		}

		/* За параграф с "id=p1" */
		#p1{
			font-family: "Times New Roman", Times, serif;
		}
		/* За параграф с "id=p2" */
		#p2{
			font-family: "ChasingEmbers";

		}
	</style>
</head>
<body>
	<p id="p1">Paragraph1</p>
	<p id="p2">Paragraph2</p>
</body>
</html>
