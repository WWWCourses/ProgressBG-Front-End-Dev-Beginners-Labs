<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>CSS_BoxModel </title>
	<style>
		body{
			border:5px solid blue;
		}
		.box{
			border:20px solid red;
			background-color: darkred;
			color:gray;
			margin:0;
			min-height: 200px;
			max-width: 300px;
			width: 200px;
			box-sizing: border-box;
			text-align: center;
			font-size: 50px;
		}
	</style>
</head>
<body>
	<h1>CSS Box model</h1>
	<p class="box">Lorem ipsum dolor sit amet consectetur adipisicing elit. Alias temporibus exercitationem quidem reiciendis vero neque fugiat aperiam eum cum a beatae aut, adipisci sint quia optio aspernatur tenetur esse doloribus? </p>
	<!-- <p class="box">BOX</p> -->
</body>
</html>
