<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>floatBasics </title>
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/meyer-reset/2.0/reset.min.css">
	<style>
		body{
			border: 20px solid orange;
		}
		.container{
			border:5px solid #999;
		}
		footer{
			border:5px solid #000;
		}
		.red{
			width: 200px;
			height: 200px;
			background-color: red;
			float: right;
		}
		.blue{
			width: 200px;
			height: 200px;
			background-color: blue;
			float: right;
		}

	</style>
</head>
<body>
	<div class="container">
		<div class="red"></div>
		<div class="blue"></div>
	</div>
	<footer>foter</footer>
</body>
</html>
