<body>
	<div>Продължаваме след: <span class="counter"></span></div>

	<script>
		function decrementCounter() {
			counter--;
			dom.counter.innerHTML = counter;
			if(counter===0){
				clearInterval(id)
			}
		}
		let counter = 100;



		const dom = {
			counter: document.querySelector('.counter')
		}

		dom.counter.innerHTML = counter;

		let id = setInterval(decrementCounter, 10);
