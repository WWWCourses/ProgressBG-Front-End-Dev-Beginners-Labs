<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>trackList </title>
	<link rel="stylesheet" type="text/css" href="https://stackpath.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css">
	<style>
		.player ul {
			border: 1px solid red;
			list-style-type: none;
		}
		.player ul li {
			border: 1px solid blue;
		}
		.player ul > li:hover {
			cursor: pointer;
		}

		.player ul li > i {
			font-size: 0.8em;
			margin-right: 0.5em;
			color: #00ffdd;
		}
		.output {
			display: block;
			border: 2px groove #00ffdd;
			padding: 0.5em;
			text-align: center;
		}

	</style>
</head>
<body>
	<div class="nav">
		<ul>
			<li>dksfds</li>
		</ul>
	</div>
	<!-- <input type="text"> -->
	<div class="player">
		<h2>Select track:</h2>
		<ul>
			<li id="li1"><i class="fa fa-play"></i>Track 1</li>
			<li><i class="fa fa-play"></i>Track 2</li>
			<li><i class="fa fa-play"></i>Track 3</li>
			<li><i class="fa fa-play"></i>Track 4</li>
			<li><i class="fa fa-play"></i>Track 5</li>
			<li><i class="fa fa-play"></i>Track 6</li>
			<li><i class="fa fa-play"></i>Track 7</li>
			<li><i class="fa fa-play"></i>Track 8</li>
			<li><i class="fa fa-play"></i>Track 9</li>
			<li><i class="fa fa-play"></i>Track 10</li>
			<li><i class="fa fa-play"></i>Track 11</li>
			<li><i class="fa fa-play"></i>Track 12</li>
		</ul>
		<div class="output">playing track: <span></span></div>
	</div>

	<script>
		let trackUL = document.querySelector(".player ul");
		// let tracks = document.querySelectorAll(".player li");
		// console.dir(tracks);

		let output = document.querySelector(".output span")

		trackUL.addEventListener("click",function(e) {
			// console.dir(`e.target: ${e.target}`);
			let track = e.target;

			output.innerText = track.innerText;
		})

		// for(let i=0; i<tracks.length; i++){
		// 	let track = tracks[i];
		// 	// console.log(`track: ${track.innerText}`);

		// 	track.addEventListener("click", function (e) {
		// 		output.innerText = track.innerText;
		// 	});
		// }

	</script>
</body>
</html>
